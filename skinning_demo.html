<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Skinning Data Visualizer</title>
    <style>
        /* reset */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Panel */
        .ui-panel {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 320px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            z-index: 100;
            max-height: 90vh;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 8px;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .control-value {
            color: #44aaff;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4af;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4af;
            cursor: pointer;
            border: none;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .status {
            font-size: 11px;
            color: #888;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-ok {
            color: #44ff44;
        }

        .status-error {
            color: #ff4444;
        }

        .status-loading {
            color: #ffaa44;
        }

        .button-row {
            display: flex;
            gap: 6px;
        }

        .button-row button {
            flex: 1;
            width: auto;
            margin-top: 0;
        }

        .keyframe-select {
            width: 100%;
            min-height: 120px;
            padding: 6px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            outline: none;
        }

        .keyframe-meta {
            margin-top: 6px;
            font-size: 11px;
            color: #bbb;
            line-height: 1.4;
        }

        .hint-text {
            margin-top: 6px;
            font-size: 11px;
            color: #888;
        }

        /* Info Box */
        .info-box {
            position: fixed;
            bottom: 16px;
            left: 16px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 12px;
            z-index: 100;
            max-width: 300px;
        }

        .info-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #4af;
        }

        code {
            display: block;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            margin: 4px 0;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            overflow-x: auto;
        }

        button {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            background: #4af;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #5bf;
        }

        button:active {
            background: #39d;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- UI Panel -->
    <div class="ui-panel">
        <div class="panel-title">🎯 Skinning Visualizer</div>

        <!-- 데이터 로드 -->
        <div class="control-group">
            <label class="control-label">
                데이터 경로
                <span class="control-value" id="dataPathStatus">로드 대기</span>
            </label>
            <input type="text" id="dataPath" value="./public/nubjuk_face_rg_nodes300_sigma5.0" 
                   style="width: 100%; padding: 6px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;">
            <button onclick="window.loadData()">🔄 데이터 로드</button>
            <button onclick="window.resetRig()">↩️ 리깅 원상복귀</button>
        </div>

        <!-- 시각화 옵션 -->
        <div class="control-group">
            <div class="checkbox-group">
                <input type="checkbox" id="showSplats" checked>
                <label for="showSplats">가우시안 스플랫 표시</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="showNodes" checked>
                <label for="showNodes">스키닝 포인트 표시</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="showEdges" unchecked>
                <label for="showEdges">본 연결선 표시</label>
            </div>
        </div>

        <!-- Gaussian Splat Controls -->
        <div class="control-group">
            <label class="control-label">
                GS 스케일
                <span class="control-value" id="gsScaleValue">1.0</span>
            </label>
            <input type="range" id="gsScale" min="0.1" max="10" step="0.1" value="1.0" oninput="setGSScale()">
        </div>

        <div class="control-group">
            <label class="control-label">
                GS 알파
                <span class="control-value" id="gsAlphaValue">0.8</span>
            </label>
            <input type="range" id="gsAlpha" min="0" max="1" step="0.01" value="0.8" oninput="setGSAlpha()">
        </div>

        <!-- 본 선택 -->
        <div class="control-group">
            <label class="control-label">
                선택된 본
                <span class="control-value" id="selectedBoneValue">0</span>
            </label>
            <input type="range" id="selectedBone" min="0" max="23" value="0" 
                   oninput="updateSelectedBone()">
        </div>

        <!-- 본 회전 -->
        <div class="control-group">
            <label class="control-label">
                X 회전
                <span class="control-value" id="rotXValue">0°</span>
            </label>
            <input type="range" id="rotX" min="-180" max="180" value="0" 
                   oninput="updateBoneRotation()">
        </div>

        <div class="control-group">
            <label class="control-label">
                Y 회전
                <span class="control-value" id="rotYValue">0°</span>
            </label>
            <input type="range" id="rotY" min="-180" max="180" value="0" 
                   oninput="updateBoneRotation()">
        </div>

        <div class="control-group">
            <label class="control-label">
                Z 회전
                <span class="control-value" id="rotZValue">0°</span>
            </label>
            <input type="range" id="rotZ" min="-180" max="180" value="0" 
                   oninput="updateBoneRotation()">
        </div>

        <!-- 키프레임 등록 -->
        <div class="control-group">
            <label class="control-label">
                키프레임
                <span class="control-value" id="keyframeCount">0</span>
            </label>
            <input type="text" id="keyframeName" placeholder="예: idle_01" 
                   style="width: 100%; padding: 6px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; margin-bottom: 8px;">
            <div class="button-row" style="margin-bottom: 6px;">
                <button onclick="window.registerKeyframe()">현재 포즈 등록</button>
                <button id="applyKeyframeBtn" onclick="window.applySelectedKeyframe()" disabled>선택 적용</button>
            </div>
            <div class="button-row" style="margin-bottom: 8px;">
                <button id="deleteKeyframeBtn" onclick="window.deleteSelectedKeyframe()" disabled>삭제</button>
                <button onclick="window.clearKeyframes()">전체 삭제</button>
            </div>
            <div class="button-row" style="margin-bottom: 8px;">
                <button onclick="window.importKeyframesFromFile()">파일 불러오기</button>
                <button id="exportKeyframesBtn" onclick="window.exportKeyframesToFile()" disabled>파일 저장</button>
            </div>
            <input id="keyframeFileInput" type="file" accept="application/json,.json" style="display:none;" onchange="window.handleKeyframeFileImport(event)">
            <select id="keyframeSelect" class="keyframe-select" size="6"></select>
            <div class="keyframe-meta" id="keyframeInfo">등록된 키프레임이 없습니다.</div>
            <div class="hint-text">선택된 본과 고정된 본 상태를 함께 저장합니다.</div>
        </div>

            <!-- Catmull-Rom 애니메이션 -->
            <div class="control-group">
                <label class="control-label">
                    스플라인 애니메이션
                    <span class="control-value" id="splineAnimStatus">대기 중</span>
                </label>
                <div class="button-row" style="margin-bottom: 6px;">
                    <button id="startSplineAnimBtn" onclick="window.startSplineAnimation()">재생</button>
                    <button id="stopSplineAnimBtn" onclick="window.stopSplineAnimation()" disabled>정지</button>
                </div>
                <div class="button-row" style="margin-bottom: 8px;">
                    <button id="rebuildSplineAnimBtn" onclick="window.rebuildSplineAnimation()">트랙 다시 생성</button>
                    <button onclick="window.toggleSplineAnimation()">재생/정지 토글</button>
                </div>
                <label class="control-label">
                    재생 속도
                    <span class="control-value" id="splineAnimSpeedValue">1.00×</span>
                </label>
                <input type="range" id="splineAnimSpeed" min="0.1" max="3.0" step="0.05" value="1.0" oninput="setSplineAnimationSpeed()">
                <div class="hint-text">루프 재생은 명시적으로 정지할 때까지 계속됩니다.</div>
            </div>

        <!-- 카메라 제어 -->
        <div class="control-group">
            <label class="control-label">
                카메라 거리
                <span class="control-value" id="cameraDistValue">40</span>
            </label>
            <input type="range" id="cameraDist" min="10" max="500" value="40" 
                   oninput="updateCameraDistance()">
        </div>

        <!-- 상태 -->
        <div class="status">
            <div id="loadStatus" class="status-loading">⏳ 준비 중...</div>
            <div id="frameInfo" style="margin-top: 6px;">FPS: 0</div>
        </div>
    </div>

    <!-- Info Box -->
    <div class="info-box">
        <div class="info-title">📖 제어 방법</div>
        <p>
            🖱️ 마우스 드래그: 회전<br>
            🔍 마우스 휠: 줌<br>
            <br>
            💡 팁: 본을 선택하고 회전을 조정하면<br>
            해당 본에 바인딩된 포인트가 변형됩니다.
        </p>
    </div>

    <!-- Vite 모듈 진입점 -->
    <script type="module" src="./src/skinning_demo.js"></script>
</body>
</html>
